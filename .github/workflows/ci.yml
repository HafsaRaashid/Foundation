name: CI

on:
  push:
  pull_request:

defaults:
  run:
    working-directory: "Week 2/ticket-triage"

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./ci.db

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "Week 2/ticket-triage/package-lock.json"

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm run build
      - run: npm test
